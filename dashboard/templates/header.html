{% load static %}
<header class="topbar">
  <div class="topbar-left">
    <!-- Mobile: hamburger to open sidebar -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div>
      <div class="topbar-title">{% block topbar_title %}Dashboard{% endblock %}</div>
    </div>
  </div>

  <div class="topbar-actions">
    {% if request.user.is_authenticated %}
      <span class="topbar-greeting">Hi, {{ request.user.username }} 👋</span>
    {% endif %}
    <a href="{% url 'Task:addtask' %}" class="btn btn-primary btn-sm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
           style="width:13px;height:13px">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5"  y1="12" x2="19" y2="12"/>
      </svg>
      New Task
    </a>
  </div>
</header>
